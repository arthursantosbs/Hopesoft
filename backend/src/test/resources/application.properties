spring.application.name=hopesoft-test

spring.datasource.url=jdbc:h2:mem:hopesoft-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

app.jwt.secret=hopesoft-test-secret-change-this-before-production-2026
app.jwt.expiration-ms=86400000
app.seed.enabled=false
