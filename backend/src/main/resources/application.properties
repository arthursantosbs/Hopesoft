spring.application.name=hopesoft

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hopesoft_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:hopesoft_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hopesoft123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${APP_JWT_SECRET:hopesoft-dev-secret-change-this-before-production-2026}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.seed.enabled=${APP_SEED_ENABLED:true}

# Observabilidade - Spring Boot Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
