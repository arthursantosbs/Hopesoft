services:
  postgres:
    image: postgres:16-alpine
    container_name: hopesoft-postgres
    environment:
      POSTGRES_DB: hopesoft_db
      POSTGRES_USER: hopesoft_user
      POSTGRES_PASSWORD: hopesoft123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hopesoft_user -d hopesoft_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: hopesoft-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hopesoft_db
      SPRING_DATASOURCE_USERNAME: hopesoft_user
      SPRING_DATASOURCE_PASSWORD: hopesoft123
      APP_JWT_SECRET: ${APP_JWT_SECRET:-hopesoft-secret-key-change-in-production}
      APP_JWT_EXPIRATION_MS: 86400000
      APP_SEED_ENABLED: "true"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./hopesoft-frontend
      dockerfile: Dockerfile
    container_name: hopesoft-frontend
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
