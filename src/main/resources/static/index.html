<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HopeSoft - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <h1>🛒 HopeSoft</h1>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px; font-size: 14px;">
                Sistema de Frente de Caixa
            </p>

            <div id="login-message"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">📧 Email</label>
                    <input type="email" id="email" name="email" required placeholder="admin@hopesoft.com">
                </div>

                <div class="form-group">
                    <label for="senha">🔐 Senha</label>
                    <input type="password" id="senha" name="senha" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">
                    Entrar
                </button>
            </form>

            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color); font-size: 12px; color: var(--text-secondary);">
                <p><strong>Credenciais de Teste:</strong></p>
                <p>📧 admin@hopesoft.com</p>
                <p>🔐 hopesoft123</p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const messageDiv = document.getElementById('login-message');

            try {
                messageDiv.innerHTML = '<div class="alert alert-info">✓ Autenticando...</div>';

                const response = await api.login(email, senha);

                api.setToken(response.token);
                messageDiv.innerHTML = '';

                // Redirecionar para caixa após 500ms
                setTimeout(() => {
                    window.location.href = 'caixa.html';
                }, 500);

            } catch (error) {
                messageDiv.innerHTML = `<div class="alert alert-error">✗ ${error.message}</div>`;
                document.getElementById('senha').value = '';
            }
        });

        // Se já está logado, redirecionar para caixa
        if (api.token) {
            window.location.href = 'caixa.html';
        }
    </script>
</body>

</html>
