<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HopeSoft - Produtos</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>📦 Produtos</h1>
                    <div id="user-info" style="font-size: 12px;"></div>
                </div>
                <nav>
                    <ul>
                        <li><a href="caixa.html">💳 Caixa</a></li>
                        <li><a href="produtos.html" class="active">📦 Produtos</a></li>
                        <li><a href="relatorio.html">📊 Relatório</a></li>
                    </ul>
                    <button id="logout-btn">Sair</button>
                </nav>
            </div>
        </div>
    </header>

    <div class="container">
        <div id="message"></div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>📦 Gerenciar Produtos</h2>
                <button id="btn-novo-produto" class="btn-primary">➕ Novo Produto</button>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="search-input" placeholder="🔍 Buscar produto..." style="flex: 1;">
                <button id="btn-estoque-baixo" class="btn-warning">⚠️ Estoque Baixo</button>
                <button id="btn-limpar-filtro" class="btn-info" style="background-color: var(--gray-500);">✓ Todos</button>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Código</th>
                            <th>Preço</th>
                            <th>Estoque</th>
                            <th>Mín.</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="produtos-tbody">
                        <tr>
                            <td colspan="6" style="text-align: center;">Carregando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal de Produto -->
    <div id="produtoModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div class="modal-header" id="modal-title">Novo Produto</div>

            <form id="produto-form">
                <div class="form-group">
                    <label for="produto-nome">Nome</label>
                    <input type="text" id="produto-nome" required>
                </div>

                <div class="form-group">
                    <label for="produto-codigo">Código de Barras</label>
                    <input type="text" id="produto-codigo">
                </div>

                <div class="form-group">
                    <label for="produto-preco">Preço</label>
                    <input type="number" id="produto-preco" required step="0.01" min="0.01">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label for="produto-estoque">Estoque</label>
                        <input type="number" id="produto-estoque" required min="0">
                    </div>

                    <div class="form-group">
                        <label for="produto-estoque-min">Estoque Mín.</label>
                        <input type="number" id="produto-estoque-min" required min="0">
                    </div>
                </div>

                <div class="form-group">
                    <label for="produto-categoria">Categoria</label>
                    <select id="produto-categoria">
                        <option value="">Selecione...</option>
                    </select>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn-success" style="flex: 1;">Salvar</button>
                    <button type="button" class="btn-danger" style="flex: 1;" onclick="fecharProdutoModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let user = null;
        let produtos = [];
        let produtoEditando = null;
        let categorias = [];

        // ===== INICIALIZAÇÃO =====
        async function init() {
            try {
                if (!api.token) {
                    window.location.href = 'index.html';
                    return;
                }

                user = await api.getMe();
                document.getElementById('user-info').innerHTML = `${user.nome} (${user.perfil})`;

                await carregarProdutos();
                await carregarCategorias();
                setupEventListeners();
            } catch (error) {
                showMessage(`Erro ao carregar: ${error.message}`, 'error');
            }
        }

        // ===== CARREGAR DADOS =====
        async function carregarProdutos() {
            try {
                produtos = await api.getProdutos();
                renderizarProdutos(produtos);
            } catch (error) {
                showMessage(`Erro ao carregar produtos: ${error.message}`, 'error');
            }
        }

        async function carregarCategorias() {
            try {
                // Simulando categorias, idealmente viriam de um endpoint
                categorias = [
                    { id: 1, nome: 'Bebidas' },
                    { id: 2, nome: 'Alimentos' },
                    { id: 3, nome: 'Doces' },
                    { id: 4, nome: 'Lanches' },
                    { id: 5, nome: 'Padaria' },
                    { id: 6, nome: 'Congelados' },
                    { id: 7, nome: 'Limpeza' },
                    { id: 8, nome: 'Higiene' }
                ];

                const select = document.getElementById('produto-categoria');
                select.innerHTML = '<option value="">Selecione...</option>' +
                    categorias.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
            } catch (error) {
                console.error('Erro ao carregar categorias:', error);
            }
        }

        function renderizarProdutos(lista) {
            const tbody = document.getElementById('produtos-tbody');

            if (lista.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 30px;">Nenhum produto encontrado</td></tr>';
                return;
            }

            tbody.innerHTML = lista.map(p => `
                <tr>
                    <td><strong>${p.nome}</strong></td>
                    <td>${p.codigoBarras || '-'}</td>
                    <td>R$ ${formatarMoeda(p.preco)}</td>
                    <td style="${p.estoqueBaixo ? 'color: var(--warning-color); font-weight: 600;' : ''}">${p.estoque}</td>
                    <td>${p.estoqueMin}</td>
                    <td>
                        <button onclick="editarProduto(${p.id})" class="btn-small btn-primary">✏️</button>
                        <button onclick="desativarProduto(${p.id})" class="btn-small btn-danger">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        // ===== MODAL =====
        function abrirProdutoModal(id = null) {
            const modal = document.getElementById('produtoModal');
            const form = document.getElementById('produto-form');

            if (id) {
                produtoEditando = produtos.find(p => p.id === id);
                document.getElementById('modal-title').textContent = '✏️ Editar Produto';
                document.getElementById('produto-nome').value = produtoEditando.nome;
                document.getElementById('produto-codigo').value = produtoEditando.codigoBarras || '';
                document.getElementById('produto-preco').value = produtoEditando.preco;
                document.getElementById('produto-estoque').value = produtoEditando.estoque;
                document.getElementById('produto-estoque-min').value = produtoEditando.estoqueMin;
                document.getElementById('produto-categoria').value = produtoEditando.categoria?.id || '';
            } else {
                produtoEditando = null;
                document.getElementById('modal-title').textContent = '➕ Novo Produto';
                form.reset();
            }

            modal.classList.add('active');
        }

        function fecharProdutoModal() {
            document.getElementById('produtoModal').classList.remove('active');
        }

        // ===== SALVAR PRODUTO =====
        async function salvarProduto(e) {
            e.preventDefault();

            const dados = {
                nome: document.getElementById('produto-nome').value,
                codigoBarras: document.getElementById('produto-codigo').value,
                preco: parseFloat(document.getElementById('produto-preco').value),
                estoque: parseInt(document.getElementById('produto-estoque').value),
                estoqueMin: parseInt(document.getElementById('produto-estoque-min').value),
                categoriaId: document.getElementById('produto-categoria').value || null,
                ativo: true
            };

            try {
                if (produtoEditando) {
                    await api.updateProduto(produtoEditando.id, dados);
                    showMessage('✓ Produto atualizado com sucesso!', 'success');
                } else {
                    await api.createProduto(dados);
                    showMessage('✓ Produto criado com sucesso!', 'success');
                }

                fecharProdutoModal();
                await carregarProdutos();
            } catch (error) {
                showMessage(`Erro: ${error.message}`, 'error');
            }
        }

        async function editarProduto(id) {
            abrirProdutoModal(id);
        }

        async function desativarProduto(id) {
            if (!confirm('Tem certeza que deseja desativar este produto?')) return;

            try {
                await api.desativarProduto(id);
                showMessage('✓ Produto desativado!', 'success');
                await carregarProdutos();
            } catch (error) {
                showMessage(`Erro: ${error.message}`, 'error');
            }
        }

        // ===== EVENTOS =====
        function setupEventListeners() {
            document.getElementById('btn-novo-produto').addEventListener('click', () => abrirProdutoModal());
            document.getElementById('produto-form').addEventListener('submit', salvarProduto);

            document.querySelector('.modal-close').addEventListener('click', fecharProdutoModal);

            document.getElementById('search-input').addEventListener('input', (e) => {
                const termo = e.target.value.toLowerCase();
                const filtrados = produtos.filter(p =>
                    p.nome.toLowerCase().includes(termo) ||
                    p.codigoBarras?.toLowerCase().includes(termo)
                );
                renderizarProdutos(filtrados);
            });

            document.getElementById('btn-estoque-baixo').addEventListener('click', async () => {
                try {
                    const estoqueBaixo = await api.getProdutosComEstoqueBaixo();
                    renderizarProdutos(estoqueBaixo);
                    showMessage('Mostrando apenas produtos com estoque baixo', 'info');
                } catch (error) {
                    showMessage(`Erro: ${error.message}`, 'error');
                }
            });

            document.getElementById('btn-limpar-filtro').addEventListener('click', () => {
                document.getElementById('search-input').value = '';
                renderizarProdutos(produtos);
            });

            document.getElementById('logout-btn').addEventListener('click', () => {
                api.removeToken();
                window.location.href = 'index.html';
            });
        }

        // ===== UTILITÁRIOS =====
        function formatarMoeda(valor) {
            return valor.toFixed(2).replace('.', ',');
        }

        function showMessage(msg, type) {
            const container = document.getElementById('message');
            const alertClass = `alert-${type === 'error' ? 'error' : type === 'warning' ? 'warning' : type === 'success' ? 'success' : 'info'}`;
            container.innerHTML = `<div class="alert ${alertClass}">${msg}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 3000);
        }

        // Iniciar
        init();
    </script>
</body>

</html>
